<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erfan Rigi — Creative Systems Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ede6;
    --muted: #6b6860;
    --accent: #c8f04a;
    --border: rgba(240,237,230,0.08);
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 2.5rem 3rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--fg);
    text-decoration: none;
  }

  .logo span {
    color: var(--accent);
  }

  nav {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  nav a {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--fg); }

  /* HERO */
  .hero {
    position: relative;
    z-index: 1;
    padding: 6rem 3rem 4rem;
    max-width: 900px;
  }

  .hero-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: inline-block;
    width: 2rem;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--fg);
    margin-bottom: 2rem;
  }

  h1 em {
    font-style: normal;
    color: var(--muted);
  }

  .hero-desc {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--muted);
    max-width: 400px;
  }

  /* PORTFOLIO SECTION */
  .portfolio {
    position: relative;
    z-index: 1;
    padding: 2rem 3rem 5rem;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .figma-frame {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #111;
    position: relative;
  }

  .figma-frame iframe {
    width: 100%;
    height: 56.25vw;
    max-height: 680px;
    min-height: 360px;
    display: block;
    border: none;
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-left {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .footer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 0.5rem;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ANIMATIONS */
  .hero, .portfolio { opacity: 0; transform: translateY(24px); animation: fadeUp 0.8s forwards; }
  .portfolio { animation-delay: 0.15s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: 1.5rem; flex-direction: column; gap: 1.5rem; }
    .hero { padding: 3rem 1.5rem 2rem; }
    .portfolio { padding: 1.5rem 1.5rem 3rem; }
    footer { padding: 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
    nav { gap: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">ER<span>.</span></a>
  <nav>
    <a href="#work">Work</a>
    <a href="mailto:your@email.com">Contact</a>
  </nav>
</header>

<section class="hero" id="about">
  <p class="hero-eyebrow">Available for projects</p>
  <h1>Erfan<br><em>Rigi</em></h1>
  <p class="hero-desc">Creative Systems Designer crafting thoughtful visual systems, brands, and digital experiences.</p>
</section>

<section class="portfolio" id="work">
  <p class="section-label">Selected Work</p>
  <div class="figma-frame">
    <iframe
      src="https://embed.figma.com/slides/SNkx9w6R4qUjNzvDv5XGtT/PORTFOLIO?node-id=2026-208&embed-host=share"
      allowfullscreen
      loading="lazy"
      title="Erfan Rigi Portfolio">
    </iframe>
  </div>
</section>

<footer>
  <span class="footer-left"><span class="footer-dot"></span>Erfan Rigi — Creative Systems Designer</span>
  <span style="font-size:0.75rem; color: var(--muted);">© 2026</span>
</footer>

</body>
</html>
